name: WPB Daily Inventory Scrape

on:
  schedule:
    # 5:00 AM EST = 10:00 AM UTC
    - cron: '1 10 * * *'
    # 9:00 AM EST = 14:00 UTC
    - cron: '1 14 * * *'

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest history.json
        run: |
          echo "Fetching latest history.json from releases..."
          ASSET_URL=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/releases/latest \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assets = data.get('assets', [])
          match = next((a['url'] for a in assets if a['name'] == 'history.json'), '')
          print(match)
          ")
          if [ -n "$ASSET_URL" ]; then
            curl -s -L \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/octet-stream" \
              "$ASSET_URL" -o history.json
            echo "✅ Downloaded history.json ($(du -sh history.json | cut -f1))"
          else
            echo "No existing history.json found — starting fresh"
          fi

      - name: Run scraper
        run: node scrape.js

      - name: Upload history.json to GitHub Releases
        run: |
          TIMESTAMP=$(TZ='America/New_York' date '+%Y-%m-%d-%H%M')
          TAG="snapshot-${TIMESTAMP}"
          LABEL="Snapshot ${TIMESTAMP} ET"
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"${LABEL}\",\"body\":\"Automated inventory snapshot\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data-binary @history.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=history.json"
          echo "✅ Uploaded to release: ${LABEL}"

      - name: Commit attribute cache
        run: |
          git config --global user.name  "WPB Scraper Bot"
          git config --global user.email "scraper@wpbwatchco.com"
          git add attribute-cache.json
          git diff --staged --quiet || git commit -m "Update cache - $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Netlify deploy
        run: |
          if [ -n "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
            echo "✅ Netlify deploy triggered"
          else
            echo "⚠️  NETLIFY_BUILD_HOOK not set — skipping"
          fi
