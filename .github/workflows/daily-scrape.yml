name: WPB Daily Inventory Scrape

on:
  schedule:
    - cron: '1 10 * * *'
    - cron: '1 14 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Download latest history.json
        run: |
          ASSET_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/releases/latest | python3 -c "import sys, json; data = json.load(sys.stdin); assets = data.get('assets', []); match = next((a['url'] for a in assets if a['name'] == 'history.json'), ''); print(match)")
          if [ -n "$ASSET_URL" ]; then
            curl -s -L -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" "$ASSET_URL" -o history.json && echo "Downloaded history.json"
          else
            echo "No existing history.json"
          fi
      - name: Run inventory scraper
        run: node scrape.js
      - name: Run FB Marketplace scraper (5am only)
        if: github.event.schedule == '1 10 * * *' || github.event_name == 'workflow_dispatch'
        env:
          FB_COOKIES: ${{ secrets.FB_COOKIES }}
        run: |
          if [ -z "$FB_COOKIES" ]; then
            echo "FB_COOKIES not set - run export-fb-cookies.js and add as secret FB_COOKIES"
          else
            npx playwright install chromium --with-deps
            node fb-scraper.js
          fi
      - name: Run FB sync check (5am only)
        if: github.event.schedule == '1 10 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          if [ -f "fb-listings.json" ]; then node fb-check.js; else echo "fb-listings.json not found"; fi
      - name: Upload history.json to GitHub Releases
        run: |
          TSTAMP=$(TZ='America/New_York' date '+%Y-%m-%d-%H%M')
          RELEASE_ID=$(curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Content-Type: application/json" https://api.github.com/repos/${{ github.repository }}/releases -d "{\"tag_name\":\"snapshot-${TSTAMP}\",\"name\":\"Snapshot ${TSTAMP} ET\",\"body\":\"Automated snapshot\"}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          curl -s -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" -H "Content-Type: application/json" --data-binary @history.json "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=history.json"
          echo "Uploaded"
      - name: Commit updated files
        run: |
          git config --global user.name "WPB Scraper Bot"
          git config --global user.email "scraper@wpbwatchco.com"
          git add attribute-cache.json fb-listings.json fb-sync-results.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto update - $(TZ='America/New_York' date '+%Y-%m-%d %I:%M %p ET')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trigger Netlify deploy
        run: |
          if [ -n "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}" && echo "Netlify deploy triggered"; fi